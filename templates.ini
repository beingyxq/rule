[custom]
;设置规则标志位
;按照从上往下的顺序遍历，优先命中上位规则

; --- 基础拦截与直连 ---
ruleset=REJECT,[]AND,((DOMAIN-KEYWORD,stun),(NETWORK,UDP))
ruleset=REJECT,[]AND,((NETWORK,UDP),(DST-PORT,3478))
ruleset=REJECT,[]AND,((NETWORK,UDP),(DST-PORT,443))
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,127.0.0.0/8,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,172.16.0.0/12,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,10.0.0.0/8,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,192.168.0.0/16,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,fc00::/7,no-resolve

; --- Emby 特殊直连/代理规则 (原内联内容) ---
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,guaiguaiemby.83787.de
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,uhdnow.com

; --- 外部规则集 (Rule Providers) ---
; AI 相关
ruleset=🎯 全球直连,clash-domain:https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/category-ai-cn.mrs,600
ruleset=🇺🇸 美国Auto,clash-domain:https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/category-ai-!cn.mrs,600

; 基础代理列表
ruleset=🚀 节点选择,clash-domain:https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/proxy-list.txt,600
ruleset=🚀 节点选择,clash-domain:https://cdn.jsdelivr.net/gh/beingyxq/rule/stunserver.list,600
ruleset=🇺🇸 美国Auto,clash-domain:https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/youtube.mrs,600

; Telegram
ruleset=🇺🇸 美国Auto,[]GEOSITE,telegram
ruleset=🇺🇸 美国Auto,[]GEOIP,telegram,no-resolve
ruleset=🇺🇸 美国Auto,clash-ipcidr:https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geoip/telegram.mrs,600

; Google 相关
ruleset=🇺🇸 美国Auto,[]DOMAIN,googleapis.cn
ruleset=🇺🇸 美国Auto,[]DOMAIN,gstatic.com
ruleset=🇺🇸 美国Auto,[]GEOSITE,google
ruleset=🇺🇸 美国Auto,[]GEOIP,google,no-resolve

; --- 国内规则兜底 ---
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve

; --- 最终兜底 ---
ruleset=🚀 节点选择,[]FINAL

; --- 设置节点分组 ---
; 核心逻辑：节点选择 > 美国Auto > 自动选择 > 节点池
custom_proxy_group=🚀 节点选择`select`[]🇺🇸 美国Auto`[]♻️ 自动选择`[]🎯 全球直连`.*
custom_proxy_group=🇺🇸 美国Auto`url-test`(美|US|United States|USA)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=♻️ 自动选择`url-test`.*`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🎯 全球直连`select`[]DIRECT

;下方参数请勿修改
enable_rule_generator=true
overwrite_original_rules=true
